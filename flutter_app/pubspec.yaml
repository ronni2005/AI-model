name: rural_health_ai
description: Offline Multimodal AI Assistant for Rural Health Workers

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0
  image_picker: ^1.0.7
  pdf: ^3.10.7
  printing: ^5.12.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  share_plus: ^7.2.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  uuid: ^4.3.3
  file_picker: ^11.0.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/translations/